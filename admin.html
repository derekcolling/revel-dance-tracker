<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport" />
    <title>Stage Manager - Revel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Manrope', 'sans-serif'] },
                    colors: {
                        dark: '#121212',
                        surface: '#1E1E1E',
                        neonGreen: '#39FF14',
                        electricBlue: '#00E5FF',
                        glowOrange: '#FF4D00'
                    }
                }
            }
        }
    </script>
    <link href="css/styles.css" rel="stylesheet">
</head>

<body class="flex flex-col h-screen bg-dark text-white antialiased overflow-hidden select-none">

    <!-- Header -->
    <header class="px-5 pt-5 pb-3 bg-surface border-b border-gray-800">
        <div class="flex justify-between items-center mb-3">
            <div>
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Stage Manager</span>
                <h1 class="text-lg font-bold" id="competitionName">Revel Dance Competition</h1>
            </div>
            <div class="flex items-center gap-2">
                <div id="statusBadge"
                    class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider bg-neonGreen/20 text-neonGreen border border-neonGreen/30">
                    Live
                </div>
                <a href="index.html" class="w-8 h-8 rounded-full bg-dark flex items-center justify-center text-gray-500 hover:text-white">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                </a>
            </div>
        </div>
        <!-- Jump-to & Prev -->
        <div class="flex items-center gap-2">
            <button id="prevBtn"
                class="bg-dark border border-gray-700 hover:border-gray-500 rounded-xl px-4 py-2 text-sm font-bold transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                Prev
            </button>
            <div class="flex-1 flex items-center gap-2">
                <input type="text" id="jumpInput" placeholder="Jump to #"
                    class="flex-1 bg-dark border border-gray-700 rounded-xl px-3 py-2 text-sm text-center focus:outline-none focus:border-electricBlue transition-colors">
                <button id="jumpBtn"
                    class="bg-electricBlue text-dark px-4 py-2 rounded-xl font-bold text-sm hover:bg-cyan-300 transition-colors">Go</button>
            </div>
        </div>
    </header>

    <!-- Current Dance Display -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <div class="flex-shrink-0 text-center py-5 px-5">
            <p class="text-gray-500 uppercase tracking-widest font-bold text-xs mb-1">Currently On Stage</p>
            <div class="text-7xl font-black text-electricBlue leading-none mb-2" id="adminCurrentDance">#1</div>
            <h2 class="text-xl font-bold" id="adminDanceName">Loading...</h2>
            <p class="text-sm text-gray-400 mt-0.5" id="adminDanceInfo">Please wait</p>
            <p class="text-xs text-gray-600 mt-1" id="adminDanceDay"></p>
        </div>

        <!-- Upcoming Dances -->
        <div class="flex-1 overflow-y-auto px-5 pb-4">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Up Next</p>
            <div id="upcomingList" class="space-y-2">
                <!-- filled by JS -->
            </div>
        </div>
    </main>

    <!-- Giant NEXT Button -->
    <div class="flex-shrink-0 p-5 pt-2">
        <button id="nextBtn"
            class="w-full h-32 rounded-3xl bg-neonGreen text-dark text-3xl font-black shadow-[0_0_40px_rgba(57,255,20,0.3)] hover:shadow-[0_0_60px_rgba(57,255,20,0.5)] active:scale-[0.97] transition-all flex items-center justify-center gap-3">
            NEXT DANCE
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"/></svg>
        </button>
        <p class="text-center text-[10px] text-gray-600 mt-2" id="positionIndicator"></p>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>

</html>
