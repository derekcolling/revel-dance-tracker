<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Revel Dance Competition - Live Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Manrope', 'sans-serif'] },
                    colors: {
                        dark: '#121212',
                        surface: '#1E1E1E',
                        neonGreen: '#39FF14',
                        electricBlue: '#00E5FF',
                        glowOrange: '#FF4D00'
                    }
                }
            }
        }
    </script>
    <link href="css/styles.css" rel="stylesheet">
</head>

<body class="flex flex-col min-h-screen max-w-md mx-auto overflow-x-hidden bg-dark text-white antialiased">

    <!-- Header -->
    <header class="pt-6 px-6 pb-4 flex justify-between items-center">
        <div class="flex flex-col">
            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Live Competition</span>
            <h1 class="text-lg font-bold" id="competitionName">Revel Dance Competition</h1>
        </div>
        <div class="flex items-center gap-3">
            <button id="alertToggle" title="Toggle alerts"
                class="w-9 h-9 rounded-full bg-surface border border-gray-700 flex items-center justify-center text-neonGreen hover:bg-dark transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
            </button>
            <a href="index.html"
                class="w-9 h-9 rounded-full bg-surface border border-gray-700 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
            </a>
        </div>
    </header>

    <main class="flex-grow px-6 space-y-6 pb-6">

        <!-- On Stage Display -->
        <section class="flex flex-col items-center justify-center py-4">
            <div class="relative w-56 h-56 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full progress-ring-gradient opacity-20"></div>
                <div class="absolute inset-2 rounded-full border-4 border-dashed border-electricBlue/30"></div>
                <div class="flex flex-col items-center">
                    <span class="text-electricBlue font-bold tracking-widest text-[10px] mb-1 uppercase">On Stage</span>
                    <span class="text-6xl font-black text-white leading-none" id="currentDanceDisplay">...</span>
                    <div class="mt-3 text-center">
                        <h3 class="font-bold text-sm" id="currentDanceTitle">Loading...</h3>
                        <p class="text-xs text-gray-500" id="currentDanceStudio"></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Track a Dance -->
        <section>
            <div class="bg-surface rounded-2xl p-4 border border-white/5">
                <div class="flex gap-2">
                    <input type="text" id="danceTrackInput" placeholder="Enter dance # to track"
                        class="bg-dark border border-gray-700 rounded-xl px-4 py-2.5 flex-1 text-sm focus:outline-none focus:border-electricBlue transition-colors"
                        inputmode="text">
                    <button id="addTrackBtn"
                        class="bg-electricBlue text-dark font-bold px-5 rounded-xl hover:bg-cyan-300 active:scale-95 transition-all text-lg">+</button>
                </div>
            </div>
        </section>

        <!-- Tracked Dances -->
        <section>
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider">My Dances
                    <span class="text-electricBlue" id="trackedCount">0</span>
                </h3>
            </div>
            <div id="trackedDancesContainer" class="space-y-3">
                <p class="text-gray-600 text-sm text-center py-8">Add a dance number above to start tracking</p>
            </div>
        </section>

    </main>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/alerts.js"></script>
    <script type="module" src="js/parent.js"></script>
</body>

</html>
